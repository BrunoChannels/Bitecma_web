        "400":
          $ref: "#/components/responses/Error400"
        "401":
          $ref: "#/components/responses/Error401"
        "500":
          $ref: "#/components/responses/Error500"
  /auth/avatar:
    post:
      tags: [Auth]
      summary: Subir avatar
      description: Sube un archivo de imagen (jpg/png/webp) y actualiza avatar_url del usuario autenticado.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AvatarEntrada"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AvatarRespuesta"
        "400":
          $ref: "#/components/responses/Error400"
        "401":
          $ref: "#/components/responses/Error401"
        "500":
          $ref: "#/components/responses/Error500"

  /operaciones:
    get:
      tags: [Operaciones]
      summary: Listar operaciones
      description: Lista operaciones con su estructura (botes, transectos, muestras) según exista en la base.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperacionListaRespuesta"
        "500":
          $ref: "#/components/responses/Error500"
    post:
      tags: [Operaciones]
      summary: Crear operación
      description: |-
        Crea una operación y opcionalmente su detalle (botes/transectos/muestras).

        Nota: el campo id debe ser único.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperacionEntrada"
      responses:
        "201":
          description: Creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperacionUnaRespuesta"
        "400":
          $ref: "#/components/responses/Error400"
        "401":
          $ref: "#/components/responses/Error401"
        "409":
          $ref: "#/components/responses/Error409"
        "500":
          $ref: "#/components/responses/Error500"
  /operaciones/{id}:
    parameters:
      - $ref: "#/components/parameters/IdOperacion"
    get:
      tags: [Operaciones]
      summary: Obtener operación
      description: Obtiene una operación por id, incluyendo botes/transectos/muestras.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OperacionUnaRespuesta"
        "404":
          $ref: "#/components/responses/Error404"
        "500":
          $ref: "#/components/responses/Error500"
    put:
      tags: [Operaciones]
      summary: Actualizar operación
      description: Actualiza datos de cabecera y sincroniza detalle (botes/transectos/muestras) si se envía en el body.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OperacionEntradaParcial"
      responses:
