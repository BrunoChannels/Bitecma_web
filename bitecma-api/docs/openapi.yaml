openapi: 3.0.3
info:
  title: BITECMA API
  version: "1.0.0"
  description: |-
    API REST de BITECMA para administrar operaciones AMERB y catálogos asociados.

    Autenticación
    - Obtén un JWT en POST /auth/login
    - Usa el header Authorization: Bearer {token} en endpoints protegidos

    Base URL
    - Esta API acepta rutas con y sin prefijo /api (depende del despliegue)
    - Si tu servidor expone la API bajo /api, usa el servidor “Con prefijo /api”

    Formato
    - Todas las respuestas JSON devuelven { ok: boolean, ... }
servers:
  - url: /
    description: API sin prefijo
  - url: /api
    description: API con prefijo /api
tags:
  - name: Sistema
    description: Estado y endpoints base.
  - name: Auth
    description: Login, perfil y carga de avatar (JWT Bearer).
  - name: Operaciones
    description: CRUD de operaciones y su estructura (botes, transectos, muestras).
  - name: Botes
    description: CRUD de botes maestro.
  - name: Caletas
    description: CRUD de caletas.
  - name: Sectores
    description: CRUD de sectores AMERB.
  - name: Organizaciones
    description: CRUD de organizaciones OPA.
  - name: Especies
    description: CRUD de especies y flags de uso (lp/dens/alga/activo).
  - name: Regiones
    description: Catálogo de regiones (solo lectura).
  - name: Usuarios
    description: Administración de usuarios (solo admin).
  - name: Backup
    description: Respaldo SQL (solo admin).
paths:
  /ping:
    get:
      tags: [Sistema]
      summary: Ping
      description: Verifica que el servicio esté activo.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RespuestaPing"
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: |-
        Autentica un usuario y retorna un JWT.

        Campos aceptados:
        - correo o email
        - password o pass
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginEntrada"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginRespuesta"
        "400":
          $ref: "#/components/responses/Error400"
        "401":
          $ref: "#/components/responses/Error401"
        "500":
          $ref: "#/components/responses/Error500"
  /auth/me:
    get:
      tags: [Auth]
      summary: Usuario autenticado
      description: Retorna los datos del usuario asociado al token.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeRespuesta"
        "401":
          $ref: "#/components/responses/Error401"
        "500":
          $ref: "#/components/responses/Error500"
  /auth/profile:
    put:
      tags: [Auth]
      summary: Actualizar perfil
      description: Actualiza nombre/correo/número del usuario autenticado.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PerfilEntrada"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
