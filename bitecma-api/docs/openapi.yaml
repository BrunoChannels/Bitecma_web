      summary: Eliminar usuario (admin)
      description: Requiere token válido y rol admin.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkRespuesta"
        "401":
          $ref: "#/components/responses/Error401"
        "403":
          $ref: "#/components/responses/Error403"
        "404":
          $ref: "#/components/responses/Error404"

  /backup/sql:
    get:
      tags: [Backup]
      summary: Descargar respaldo SQL (admin)
      description: |-
        Genera y descarga un respaldo SQL completo de la base (archivo .sql).

        Requiere token válido y rol admin.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: OK
          content:
            application/sql:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Error401"
        "403":
          $ref: "#/components/responses/Error403"
        "500":
          $ref: "#/components/responses/Error500"
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    IdEntero:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int32
    IdOperacion:
      name: id
      in: path
      required: true
      schema:
        type: string
