        "404":
          $ref: "#/components/responses/Error404"
        "409":
          $ref: "#/components/responses/Error409"
        "500":
          $ref: "#/components/responses/Error500"
    delete:
      tags: [Operaciones]
      summary: Eliminar operación
      description: Elimina la operación y todos los registros relacionados.
      security:
        - BearerAuth: []
      responses:
        "200":
